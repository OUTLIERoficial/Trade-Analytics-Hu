[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "PATH=\"$(npm prefix -g)/bin:$PATH\" pnpm install"
]

[phases.build]
cmds = [
  "PATH=\"$(npm prefix -g)/bin:$PATH\" pnpm --filter @workspace/db run build",
  "PATH=\"$(npm prefix -g)/bin:$PATH\" pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"